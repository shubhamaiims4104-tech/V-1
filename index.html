<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Habits & Brain Health Survey</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

.fade-in{animation:fadeIn .5s ease forwards}
.slide-up{animation:slideUp .5s ease forwards}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

@keyframes slideUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* breathing animation */

.breathe-circle{
animation:breathe 4s ease-in-out infinite;
}

@keyframes breathe{

0%{transform:scale(1);opacity:.5}
50%{transform:scale(1.5);opacity:1}
100%{transform:scale(1);opacity:.5}

}

</style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

<header class="bg-indigo-600 text-white shadow-md py-8 text-center">

<h1 class="text-3xl font-bold">
<i class="fas fa-brain mr-2"></i>
Digital Habits Study
</h1>

<p class="text-indigo-100">
Understanding screen use, dopamine and attention
</p>

</header>

<main class="max-w-3xl mx-auto p-4">

<!-- LANDING -->

<div id="landing" class="bg-white p-8 rounded-xl shadow slide-up text-center">

<h2 class="text-2xl font-bold mb-6">Select Your Role</h2>

<div class="grid md:grid-cols-3 gap-4">

<button onclick="startPause('Student')" class="p-6 border rounded-xl hover:bg-indigo-50">

<i class="fas fa-user-graduate text-3xl mb-3 text-blue-500"></i>
<div class="font-bold">Student</div>

</button>

<button onclick="startPause('Parent')" class="p-6 border rounded-xl hover:bg-indigo-50">

<i class="fas fa-users text-3xl mb-3 text-green-500"></i>
<div class="font-bold">Parent</div>

</button>

<button onclick="startPause('Teacher')" class="p-6 border rounded-xl hover:bg-indigo-50">

<i class="fas fa-chalkboard-teacher text-3xl mb-3 text-amber-500"></i>
<div class="font-bold">Teacher</div>

</button>

</div>
</div>


<!-- MINDFUL PAUSE -->

<div id="pause" class="hidden text-center bg-white p-10 rounded-xl shadow fade-in">

<h2 class="text-xl font-bold mb-6">Take a short pause</h2>

<div class="relative w-32 h-32 mx-auto mb-6 flex items-center justify-center">

<div class="absolute inset-0 bg-indigo-200 rounded-full breathe-circle"></div>

<div id="breatheText" class="relative bg-indigo-600 text-white w-20 h-20 rounded-full flex items-center justify-center font-bold">

Breathe

</div>

</div>

<p id="countdown" class="text-gray-500">Starting in 3...</p>

</div>


<!-- SURVEY -->

<div id="survey" class="hidden bg-white p-8 rounded-xl shadow fade-in">

<button onclick="goBack()" class="text-indigo-600 mb-6">
← Change Role
</button>

<h2 id="surveyTitle" class="text-2xl font-bold mb-6"></h2>

<form id="form" class="space-y-6">

<input type="hidden" id="roleInput" name="Role">

<div id="questions"></div>

<!-- pledge -->

<div class="bg-indigo-50 p-6 rounded-xl">

<h3 class="font-bold mb-4">Weekly Digital Pledge</h3>

<label class="block">
<input type="radio" name="Pledge" value="No screens during meals" required>
 No screens during meals
</label>

<label class="block">
<input type="radio" name="Pledge" value="Charge device outside bedroom">
 Charge device outside bedroom
</label>

<label class="block">
<input type="radio" name="Pledge" value="Outdoor activity">
 Replace 1 hour screen time with outdoor activity
</label>

</div>

<button type="submit"
class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">

Submit Survey

</button>

</form>

</div>


<!-- LOADING -->

<div id="loading" class="hidden text-center p-10">

<div class="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto"></div>

<p class="mt-4">Submitting...</p>

</div>


<!-- SUCCESS -->

<div id="success" class="hidden text-center bg-white p-10 rounded-xl shadow">

<i class="fas fa-check text-4xl text-green-500 mb-4"></i>

<h2 class="text-2xl font-bold mb-2">Thank you!</h2>

<p>Your response has been recorded.</p>

<button onclick="location.reload()" class="mt-6 bg-gray-200 px-6 py-2 rounded">

Return Home

</button>

</div>

</main>



<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxawnSi3C7AfxqTkSD47loxlK_8MlS3ZQbpNf1DNg36zA9c6UD8Jn4OQo-njbcSpxlHvA/exec";


const studentQuestions = [

{ id:"Age",label:"Your Age?",type:"radio",
options:["Under 10","10-12","13-15","16-18"]},

{ id:"FavoriteApp",label:"Hardest app to close?",
type:"radio",
options:["TikTok/Reels","Games","Instagram/Snapchat","YouTube"]},

{ id:"DailyTime",label:"Daily screen time?",
type:"radio",
options:["<1 hour","1-3 hours","4-6 hours","7+ hours"]}

];


const parentQuestions = [

{ id:"ChildAge",label:"Child Age",
type:"radio",
options:["0-4","5-8","9-12","13-15","16-18"]},

{ id:"ReactionToStopping",
label:"Reaction when screen removed",
type:"radio",
options:["Calm","Annoyed","Argues","Meltdown"]},

{ id:"FamilyArguments",
label:"How often arguments about devices?",
type:"radio",
options:["Rare","Weekly","Daily","Many times daily"]}

];


const teacherQuestions = [

{ id:"GradeTaught",
label:"Grade you teach",
type:"radio",
options:["Kindergarten","Elementary","Middle","High School"]},

{ id:"AttentionSpan",
label:"Students attention span vs 10 years ago",
type:"radio",
options:["Much shorter","Slightly shorter","Same"]},

{ id:"SocialBreaks",
label:"Student behaviour during breaks",
type:"radio",
options:["Talking","Mixed","Mostly phones"]}

];



function startPause(role){

window.selectedRole=role

document.getElementById("landing").classList.add("hidden")
document.getElementById("pause").classList.remove("hidden")

let count=3

const timer=setInterval(()=>{

count--

document.getElementById("countdown").innerText="Starting in "+count

if(count<=0){

clearInterval(timer)
startSurvey(role)

}

},1000)

}



function startSurvey(role){

document.getElementById("pause").classList.add("hidden")
document.getElementById("survey").classList.remove("hidden")

document.getElementById("surveyTitle").innerText=role+" Survey"
document.getElementById("roleInput").value=role

let questions=
role==="Student"?studentQuestions:
role==="Parent"?parentQuestions:
teacherQuestions

renderQuestions(questions)

}



function renderQuestions(qs){

const container=document.getElementById("questions")

container.innerHTML=""

qs.forEach((q,i)=>{

let html=`<div>
<label class="font-bold">${i+1}. ${q.label}</label>`

q.options.forEach(opt=>{

html+=`
<label class="block mt-2">
<input type="radio" name="${q.id}" value="${opt}" required>
 ${opt}
</label>
`

})

html+="</div>"

container.innerHTML+=html

})

}



function goBack(){

document.getElementById("survey").classList.add("hidden")
document.getElementById("landing").classList.remove("hidden")

}



document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

document.getElementById("survey").classList.add("hidden")
document.getElementById("loading").classList.remove("hidden")

const formData=new FormData(this)

let data={}

formData.forEach((v,k)=>{data[k]=v})

data["Timestamp"]=new Date().toISOString()

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data),
headers:{
"Content-Type":"application/json"
}
})

.then(res=>res.json())
.then(()=>{

document.getElementById("loading").classList.add("hidden")
document.getElementById("success").classList.remove("hidden")

})

.catch(()=>{

alert("Submission failed")
location.reload()

})

})


</script>

</body>
</html>
